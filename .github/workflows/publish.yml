## https://github.com/gesinn-it-pub/mwbot

name: Publish to npm

on:
  release:
    types:
      - published

jobs:

  publish:
    name: Publish to npmjs.org
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # Required for npm provenance (OIDC)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (Trusted Publishing requires npm >= 11.5.1)
        run: |
          corepack enable npm
          corepack prepare npm@^11 --activate

      - name: Build and run full test suite in Docker
        run: make ci

      - name: Ensure containers are stopped
        run: make down
        if: always()

      - name: Publish
        run: |
          unset NODE_AUTH_TOKEN
          npm publish --access public
